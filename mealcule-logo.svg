<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#grad1)" />

  <!-- Molecular structure - bonds -->
  <line x1="200" y1="130" x2="148" y2="190" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="200" y1="130" x2="252" y2="190" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="148" y1="190" x2="148" y2="260" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="252" y1="190" x2="252" y2="260" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="148" y1="260" x2="200" y2="290" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="252" y1="260" x2="200" y2="290" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Extra bond -->
  <line x1="200" y1="130" x2="200" y2="80" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="190" x2="100" y2="175" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="252" y1="190" x2="300" y2="175" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Molecular nodes (atoms) -->
  <circle cx="200" cy="130" r="18" fill="white" />
  <circle cx="148" cy="190" r="14" fill="white" opacity="0.95"/>
  <circle cx="252" cy="190" r="14" fill="white" opacity="0.95"/>
  <circle cx="148" cy="260" r="12" fill="white" opacity="0.9"/>
  <circle cx="252" cy="260" r="12" fill="white" opacity="0.9"/>
  <circle cx="200" cy="290" r="14" fill="white" opacity="0.95"/>
  <!-- Terminal atoms -->
  <circle cx="200" cy="80" r="10" fill="white" opacity="0.8"/>
  <circle cx="100" cy="175" r="10" fill="white" opacity="0.8"/>
  <circle cx="300" cy="175" r="10" fill="white" opacity="0.8"/>

  <!-- Fork/spoon integrated into center atom -->
  <!-- Fork prongs inside top atom -->
  <line x1="193" y1="120" x2="193" y2="140" stroke="#047857" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="118" x2="200" y2="142" stroke="#047857" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="207" y1="120" x2="207" y2="140" stroke="#047857" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Leaf accent on bottom node (health/nutrition) -->
  <path d="M200,280 Q212,272 210,286 Q208,296 200,290" fill="#34d399" opacity="0.9"/>
  <path d="M200,280 Q188,272 190,286 Q192,296 200,290" fill="#34d399" opacity="0.9"/>
</svg>